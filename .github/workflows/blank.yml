name: Build Android APK (Debug)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build with Gradle (Debug)
        run: |
          ./gradlew assembleDebug
      
      - name: List all APK files (debugging)
        run: |
          find app/build/outputs/apk -name "*.apk" | sort
      
      - name: Upload Dev Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug-apk
          path: app/build/outputs/apk/dev/debug/*.apk
        if: success() || failure()
      
      - name: Upload Tv Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-tv-debug-apk
          path: app/build/outputs/apk/tv/debug/*.apk
        if: success() || failure()
      
      - name: Upload any APK (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: app-any-apk
          path: app/build/outputs/apk/**/*.apk
        if: success() || failure()
